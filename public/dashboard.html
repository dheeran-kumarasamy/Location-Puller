<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Dashboard</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      color: #fff;
      padding: 40px 20px;
    }
    .container {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 40px;
      max-width: 1100px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; margin-bottom: 5px; }
    .link-id { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 20px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }
    .summary-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px;
    }
    .summary-label {
      color: rgba(255,255,255,0.55);
      font-size: 0.8rem;
      margin-bottom: 6px;
    }
    .summary-value {
      font-size: 1rem;
      color: #fff;
    }
    .map-shell {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 22px;
    }
    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .map-title {
      font-size: 1rem;
      color: #fff;
    }
    .map-subtitle {
      color: rgba(255,255,255,0.55);
      font-size: 0.85rem;
      margin-top: 4px;
    }
    .map-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .map-btn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .map-btn:hover { background: rgba(255,255,255,0.18); }
    #liveMap {
      width: 100%;
      height: 420px;
      border-radius: 14px;
      overflow: hidden;
    }
    .map-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      color: rgba(255,255,255,0.45);
      font-size: 1rem;
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.18);
      border-radius: 14px;
    }
    .leaflet-container {
      background: #111827;
      font-family: inherit;
    }
    .refresh-btn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      margin-bottom: 20px;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.2); }
    .no-data {
      text-align: center;
      color: rgba(255,255,255,0.4);
      padding: 40px 0;
      font-size: 0.95rem;
    }
    .location-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
    }
    .location-card .time {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      margin-bottom: 10px;
    }
    .coords {
      font-size: 1.05rem;
      color: #a8d8ff;
      margin-bottom: 8px;
    }
    .accuracy { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
    .map-link {
      display: inline-block;
      margin-top: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .map-link:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(102,126,234,0.3); }
    .auto-refresh {
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 15px;
    }
    .badge {
      display: inline-block;
      background: rgba(0,176,155,0.2);
      color: #96c93d;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-left: 10px;
    }
    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }

      #liveMap,
      .map-empty {
        height: 320px;
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Location Dashboard</h1>
    <p class="link-id">Link ID: <span id="linkId"></span></p>

    <div class="summary">
      <div class="summary-card">
        <div class="summary-label">Latest status</div>
        <div class="summary-value" id="liveStatus">Waiting</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Updates received</div>
        <div class="summary-value" id="totalUpdates">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Last update</div>
        <div class="summary-value" id="lastUpdateTime">--</div>
      </div>
    </div>

    <div class="map-shell">
      <div class="map-header">
        <div>
          <div class="map-title">Live location map</div>
          <div class="map-subtitle">The marker moves as new positions arrive from the receiver.</div>
        </div>
        <div class="map-actions">
          <button class="map-btn" onclick="focusLatestLocation()">Follow Latest</button>
        </div>
      </div>
      <div id="mapState" class="map-empty">Waiting for the first live location update...</div>
      <div id="liveMap" style="display: none;"></div>
    </div>

    <button class="refresh-btn" onclick="loadLocations()">Refresh</button>

    <div id="locations">
      <div class="no-data">Waiting for someone to share their location...</div>
    </div>

    <p class="auto-refresh">Live map updates every 3 seconds</p>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const linkId = window.location.pathname.split('/').pop();
    document.getElementById('linkId').textContent = linkId;
    let map = null;
    let latestMarker = null;
    let accuracyCircle = null;
    let pathLine = null;
    let lastRenderedCount = 0;

    function ensureMap() {
      if (map) {
        return map;
      }

      document.getElementById('mapState').style.display = 'none';
      const mapElement = document.getElementById('liveMap');
      mapElement.style.display = 'block';

      map = L.map('liveMap', {
        zoomControl: true,
        attributionControl: true,
      }).setView([20, 78], 3);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      return map;
    }

    function focusLatestLocation() {
      if (!latestMarker || !map) {
        return;
      }

      map.flyTo(latestMarker.getLatLng(), Math.max(map.getZoom(), 16), {
        animate: true,
        duration: 1.2,
      });
    }

    function updateMap(locations) {
      if (!locations.length) {
        return;
      }

      const liveMap = ensureMap();
      const coordinates = locations.map((loc) => [loc.latitude, loc.longitude]);
      const latest = locations[locations.length - 1];
      const latestLatLng = [latest.latitude, latest.longitude];

      if (!pathLine) {
        pathLine = L.polyline(coordinates, {
          color: '#7c3aed',
          weight: 4,
          opacity: 0.9,
        }).addTo(liveMap);
      } else {
        pathLine.setLatLngs(coordinates);
      }

      if (!latestMarker) {
        latestMarker = L.marker(latestLatLng).addTo(liveMap);
      } else {
        latestMarker.setLatLng(latestLatLng);
      }

      latestMarker.bindPopup(`Latest location<br>${new Date(latest.timestamp).toLocaleString()}`);

      if (!accuracyCircle) {
        accuracyCircle = L.circle(latestLatLng, {
          radius: latest.accuracy || 0,
          color: '#38bdf8',
          fillColor: '#38bdf8',
          fillOpacity: 0.16,
        }).addTo(liveMap);
      } else {
        accuracyCircle.setLatLng(latestLatLng);
        accuracyCircle.setRadius(latest.accuracy || 0);
      }

      if (lastRenderedCount === 0) {
        liveMap.fitBounds(pathLine.getBounds(), { padding: [40, 40] });
      } else if (locations.length !== lastRenderedCount) {
        liveMap.panTo(latestLatLng, { animate: true, duration: 1.0 });
      }

      setTimeout(() => liveMap.invalidateSize(), 0);
      lastRenderedCount = locations.length;
    }

    function getLiveStatus(lastTimestamp) {
      const ageMs = Date.now() - new Date(lastTimestamp).getTime();
      return ageMs < 15000 ? 'Live now' : 'Idle';
    }

    async function loadLocations() {
      try {
        const res = await fetch(`/api/locations/${linkId}`);
        if (!res.ok) {
          document.getElementById('locations').innerHTML =
            '<div class="no-data">Link not found or expired.</div>';
          document.getElementById('liveStatus').textContent = 'Unavailable';
          return;
        }

        const data = await res.json();
        const container = document.getElementById('locations');
        const totalUpdates = data.locations.length;

        document.getElementById('totalUpdates').textContent = totalUpdates;

        if (totalUpdates === 0) {
          container.innerHTML = '<div class="no-data">Waiting for someone to share their location...</div>';
          document.getElementById('liveStatus').textContent = 'Waiting';
          document.getElementById('lastUpdateTime').textContent = '--';
          document.getElementById('mapState').style.display = 'flex';
          document.getElementById('liveMap').style.display = 'none';
          return;
        }

        const latest = data.locations[data.locations.length - 1];
        document.getElementById('liveStatus').textContent = getLiveStatus(latest.timestamp);
        document.getElementById('lastUpdateTime').textContent = new Date(latest.timestamp).toLocaleTimeString();
        updateMap(data.locations);

        container.innerHTML = [...data.locations].reverse().map((loc, i) => {
          const time = new Date(loc.timestamp).toLocaleString();
          const mapsUrl = `https://www.google.com/maps?q=${loc.latitude},${loc.longitude}`;
          return `
            <div class="location-card">
              <div class="time">#${totalUpdates - i} &mdash; ${time}${i === 0 ? ' <span class="badge">Latest</span>' : ''}</div>
              <div class="coords">
                Lat: ${loc.latitude.toFixed(6)}, Lng: ${loc.longitude.toFixed(6)}
              </div>
              <div class="accuracy">Accuracy: ~${Math.round(loc.accuracy)} meters</div>
              <a class="map-link" href="${mapsUrl}" target="_blank" rel="noopener">Open in Google Maps</a>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Failed to load locations:', err);
      }
    }

    loadLocations();
    setInterval(loadLocations, 3000);
  </script>
</body>
</html>
